<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Local File Storage</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    padding:20px;
}
input{
    margin:15px 0;
}
button{
    padding:10px 20px;
    cursor:pointer;
}
.file{
    background:#222;
    margin:10px 0;
    padding:10px;
    border-radius:8px;
}
</style>
</head>
<body>

<h2>Local File Storage</h2>

<input type="file" id="files" multiple>

<button onclick="saveFiles()">Save Locally</button>

<h3>Saved Files</h3>

<div id="list"></div>

<script>
let db;

const request=indexedDB.open("LocalFiles",1);

request.onupgradeneeded=e=>{
    db=e.target.result;
    db.createObjectStore("files",{keyPath:"id",autoIncrement:true});
};

request.onsuccess=e=>{
    db=e.target.result;
    loadFiles();
};

function saveFiles(){

const files=document.getElementById("files").files;

const tx=db.transaction("files","readwrite");
const store=tx.objectStore("files");

for(let file of files){

const reader=new FileReader();

reader.onload=function(){

store.add({
name:file.name,
type:file.type,
size:file.size,
data:reader.result
});

};

reader.readAsDataURL(file);

}

tx.oncomplete=()=>{
setTimeout(loadFiles,300);
};

}

function loadFiles(){

const list=document.getElementById("list");
list.innerHTML="";

const tx=db.transaction("files","readonly");
const store=tx.objectStore("files");

store.openCursor().onsuccess=e=>{

const cursor=e.target.result;

if(cursor){

const f=cursor.value;

list.innerHTML+=`
<div class="file">
<b>${f.name}</b><br>
${(f.size/1024).toFixed(2)} KB<br>
<a href="${f.data}" download="${f.name}">
<button>Download</button>
</a>
</div>
`;

cursor.continue();

}

};

}
</script>

</body>
</html>
