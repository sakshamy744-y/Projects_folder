<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Local File Storage</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    padding:20px;
}
input{
    margin:15px 0;
}
button{
    padding:10px 20px;
    cursor:pointer;
}
.file{
    background:#222;
    margin:10px 0;
    padding:10px;
    border-radius:8px;
}
</style>
</head>
<body>

<h2>Local File Storage</h2>

<input type="file" id="files" multiple>

<button onclick="saveFiles()">Save Locally</button>

<h3>Saved Files</h3>

<div id="list"></div>

<script>
let db;

const request = indexedDB.open("LocalFiles", 1);

request.onupgradeneeded = function(e) {
    db = e.target.result;
    if (!db.objectStoreNames.contains("files")) {
        db.createObjectStore("files", {
            keyPath: "id",
            autoIncrement: true
        });
    }
};

request.onsuccess = function(e) {
    db = e.target.result;
    loadFiles();
};

request.onerror = function() {
    alert("Database failed to open!");
};

function saveFiles() {

    const files = document.getElementById("files").files;

    if(files.length===0){
        alert("Select a file first.");
        return;
    }

    for(const file of files){

        const reader = new FileReader();

        reader.onload = function(){

            const tx = db.transaction("files","readwrite");
            const store = tx.objectStore("files");

            store.add({
                name:file.name,
                type:file.type,
                size:file.size,
                date:new Date().toLocaleString(),
                data:reader.result
            });

            tx.oncomplete=function(){
                loadFiles();
            };

        };

        reader.readAsDataURL(file);

    }

}

function loadFiles(){

    const list=document.getElementById("list");
    list.innerHTML="";

    const tx=db.transaction("files","readonly");
    const store=tx.objectStore("files");

    store.openCursor().onsuccess=function(e){

        const cursor=e.target.result;

        if(cursor){

            const f=cursor.value;

            let preview="";

            if(f.type.startsWith("image/")){
                preview=`<img src="${f.data}" style="width:120px;border-radius:8px;margin-bottom:8px;">`;
            }

            list.innerHTML+=`
            <div class="file">
                ${preview}
                <b>${f.name}</b><br>
                📅 ${f.date}<br>
                📦 ${(f.size/1024).toFixed(2)} KB<br><br>

                <a href="${f.data}" download="${f.name}">
                    <button>Download</button>
                </a>

                <button onclick="deleteFile(${f.id})">
                    Delete
                </button>
            </div>
            `;

            cursor.continue();

        }

    };

}

function deleteFile(id){

    const tx=db.transaction("files","readwrite");

    tx.objectStore("files").delete(id);

    tx.oncomplete=function(){
        loadFiles();
    };

}
</script>

</body>
</html>
