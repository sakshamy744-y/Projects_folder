<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Call It</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#05020c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Call It">
<link rel="manifest" id="manifestLink" href="">
<link rel="icon" id="iconLink" href="" type="image/svg+xml">
<link rel="apple-touch-icon" id="appleIconLink" href="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --felt-1: #170826;
    --felt-2: #05020c;
    --brass-1: #f4e4b8;
    --brass-2: #d4af37;
    --brass-3: #8a6a1f;
    --ink: #f2eefb;
    --dim: rgba(230,220,255,0.55);
    --engrave: #5c430f;
    --neon-pink: #ff2fc7;
    --neon-blue: #23e6ff;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 22% 18%, rgba(255,47,199,0.18), transparent 42%),
      radial-gradient(circle at 80% 78%, rgba(35,230,255,0.16), transparent 45%),
      radial-gradient(ellipse at 50% 40%, var(--felt-1) 0%, var(--felt-2) 70%);
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
    position:relative;
  }

  body::after{
    content:"";
    position:fixed;
    left:0; right:0; bottom:0;
    height:45vh;
    background-image:
      linear-gradient(rgba(35,230,255,0.16) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,47,199,0.14) 1px, transparent 1px);
    background-size:44px 44px;
    -webkit-mask-image:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    mask-image:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    transform:perspective(400px) rotateX(55deg);
    transform-origin:bottom;
    pointer-events:none;
    opacity:0.7;
  }

  .eyebrow{
    letter-spacing:0.35em;
    text-transform:uppercase;
    font-size:11px;
    color:#ffffff;
    margin-bottom:6px;
    opacity:0.9;
    text-shadow:0 0 12px rgba(255,255,255,0.5);
  }

  h1{
    font-family:'Cinzel', serif;
    font-weight:700;
    font-size:clamp(28px, 5vw, 42px);
    margin:0 0 8px 0;
    color:#ffffff;
    text-align:center;
    text-shadow:0 0 18px rgba(255,255,255,0.4), 0 0 30px rgba(35,230,255,0.25);
  }

  .sub{
    font-size:13px;
    color:#ffffff;
    opacity:0.75;
    margin-bottom:48px;
    text-align:center;
  }

  .stage{
    position:relative;
    width:260px;
    height:220px;
    display:flex;
    align-items:center;
    justify-content:center;
    perspective:900px;
  }

  .shadow{
    position:absolute;
    bottom:10px;
    left:50%;
    width:140px;
    height:24px;
    background:radial-gradient(ellipse, rgba(255,47,199,0.35), rgba(35,230,255,0.12) 55%, rgba(0,0,0,0) 75%);
    transform:translateX(-50%);
    transition:transform 0.35s ease, opacity 0.35s ease;
    filter:blur(3px);
  }
  .shadow.squash{ transform:translateX(-50%) scale(0.45); opacity:0.3; }

  .coin-float{
    transform-style:preserve-3d;
    animation:idleBob 3.2s ease-in-out infinite;
  }
  .coin-float.paused{ animation-play-state:paused; }

  @keyframes idleBob{
    0%,100%{ transform:translateY(0px); }
    50%{ transform:translateY(-9px); }
  }

  .coin{
    position:relative;
    width:170px;
    height:170px;
    transform-style:preserve-3d;
    cursor:grab;
    transform:rotateX(55deg) rotateY(0deg);
    will-change:transform;
  }
  .coin.grabbing{ cursor:grabbing; }

  .face{
    position:absolute;
    inset:0;
    border-radius:50%;
    backface-visibility:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle at 35% 28%, var(--brass-1) 0%, var(--brass-2) 42%, var(--brass-3) 78%, #6b4f15 100%);
    box-shadow:
      inset 0 0 0 6px rgba(255,246,216,0.35),
      inset 0 0 0 8px rgba(80,58,10,0.5),
      inset 0 10px 18px rgba(255,255,255,0.35),
      inset 0 -14px 22px rgba(0,0,0,0.35),
      0 0 22px rgba(255,47,199,0.45),
      0 0 40px rgba(35,230,255,0.25);
  }
  .face .rim{
    position:absolute;
    inset:10px;
    border-radius:50%;
    border:2px dashed rgba(80,58,10,0.55);
  }
  .face .glyph{
    font-family:'Cinzel', serif;
    font-weight:700;
    font-size:70px;
    line-height:1;
    color:var(--engrave);
    text-shadow:0 1px 0 rgba(255,246,216,0.6), 0 -1px 1px rgba(0,0,0,0.35);
  }
  .face .man-glyph{
    filter:none;
    fill: var(--engrave);
  }
  .face .label{
    position:absolute;
    bottom:24px;
    font-size:9px;
    letter-spacing:0.3em;
    color:var(--engrave);
    font-weight:600;
    opacity:0.8;
  }

  .edge{
    position:absolute;
    inset:0;
    border-radius:50%;
    transform-style:preserve-3d;
  }
  .edge span{
    position:absolute;
    inset:0;
    border-radius:50%;
    background:linear-gradient(90deg, #6b4f15, #f4e4b8 45%, #d4af37 55%, #5c430f);
  }

  .heads{ transform: rotateY(0deg) translateZ(6px); }
  .tails{ transform: rotateY(180deg) translateZ(6px); }

  @keyframes flipToHeads{
    0%   { transform: rotateX(55deg) rotateY(0deg)   translateY(0); }
    50%  { transform: rotateX(55deg) rotateY(540deg) translateY(-90px); }
    100% { transform: rotateX(55deg) rotateY(1080deg) translateY(0); }
  }
  @keyframes flipToTails{
    0%   { transform: rotateX(55deg) rotateY(0deg)   translateY(0); }
    50%  { transform: rotateX(55deg) rotateY(450deg) translateY(-90px); }
    100% { transform: rotateX(55deg) rotateY(900deg)  translateY(0); }
  }
  .flip-heads{ animation: flipToHeads 1.1s ease-out forwards; }
  .flip-tails{ animation: flipToTails 1.1s ease-out forwards; }

  .controls{
    margin-top:36px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
  }
  .hint{
    font-size:11px;
    color:#ffffff;
    opacity:0.75;
    letter-spacing:0.05em;
  }
  .flip-btn{
    font-family:'Cinzel', serif;
    font-size:14px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    font-weight:700;
    color:#ffffff;
    background:linear-gradient(90deg, var(--neon-pink), var(--neon-blue));
    border:none;
    padding:14px 38px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 0 18px rgba(255,47,199,0.55), 0 0 32px rgba(35,230,255,0.35), 0 8px 18px rgba(0,0,0,0.45);
    text-shadow:0 1px 3px rgba(0,0,0,0.5);
    transition:transform 0.08s ease, box-shadow 0.08s ease, filter 0.15s ease;
  }
  .flip-btn:hover{ filter:brightness(1.08); }
  .flip-btn:active{ transform:translateY(3px); box-shadow:0 0 10px rgba(255,47,199,0.5), 0 3px 10px rgba(0,0,0,0.4); }
  .flip-btn:disabled{ opacity:0.5; cursor:default; transform:none; }

  .result{
    font-family:'Cinzel', serif;
    font-size:15px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    min-height:22px;
    color:#ffffff;
    text-shadow:0 0 14px rgba(255,255,255,0.6);
    opacity:0;
    transition:opacity 0.3s ease;
  }
  .result.show{ opacity:1; }

  .tally{
    display:flex;
    gap:28px;
    font-size:11px;
    letter-spacing:0.1em;
    color:#ffffff;
    opacity:0.75;
    text-transform:uppercase;
  }
  .tally b{
    display:block;
    font-family:'Cinzel', serif;
    font-size:20px;
    color:#ffffff;
    opacity:1;
    text-shadow:0 0 10px rgba(255,255,255,0.5);
    letter-spacing:0;
  }
  .tally div{ text-align:center; }

  .download-btn{
    margin-top:6px;
    font-family:'Inter', sans-serif;
    font-size:11px;
    letter-spacing:0.05em;
    font-weight:600;
    color:#ffffff;
    background:transparent;
    border:1px solid rgba(255,255,255,0.35);
    padding:9px 20px;
    border-radius:20px;
    cursor:pointer;
    opacity:0.8;
    transition:opacity 0.15s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .download-btn:hover{
    opacity:1;
    background:rgba(255,255,255,0.08);
    border-color:rgba(255,255,255,0.6);
  }

  @media (prefers-reduced-motion: reduce){
    .flip-heads, .flip-tails, .coin-float{ animation-duration: 0.01s; }
  }
</style>
</head>
<body>

  <div class="eyebrow">Heads or Tails</div>
  <h1>Call It</h1>
  <div class="sub">Drag to spin it yourself, or tap to toss</div>

  <div class="stage">
    <div class="shadow" id="shadow"></div>
    <div class="coin-float" id="coinFloat">
      <div class="coin" id="coin">
        <div class="edge" id="edge"></div>
        <div class="face heads">
          <div class="rim"></div>
          <svg class="glyph man-glyph" viewBox="0 0 100 100" width="80" height="80">
            <circle cx="50" cy="34" r="15"/>
            <path d="M20,90 C20,60 33,52 50,52 C67,52 80,60 80,90 Z"/>
          </svg>
          <div class="label">Heads</div>
        </div>
        <div class="face tails">
          <div class="rim"></div>
          <div class="glyph">₹</div>
          <div class="label">Tails</div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="flip-btn" id="flipBtn">Flip Coin</button>
    <div class="result" id="result">&nbsp;</div>
    <div class="tally">
      <div><b id="headsCount">0</b>Heads</div>
      <div><b id="tailsCount">0</b>Tails</div>
      <div><b id="totalCount">0</b>Total</div>
    </div>
    <button class="download-btn" id="installBtn">⭳ Install App</button>
  </div>

<script>
  const coin = document.getElementById('coin');
  const edge = document.getElementById('edge');
  const RING_COUNT = 24;
  for(let i=0;i<RING_COUNT;i++){
    const s = document.createElement('span');
    const depth = (i/(RING_COUNT-1) - 0.5) * 12; // -6px .. 6px
    s.style.transform = `translateZ(${depth}px)`;
    edge.appendChild(s);
  }
  const coinFloat = document.getElementById('coinFloat');
  const shadow = document.getElementById('shadow');
  const btn = document.getElementById('flipBtn');
  const resultEl = document.getElementById('result');
  const headsCountEl = document.getElementById('headsCount');
  const tailsCountEl = document.getElementById('tailsCount');
  const totalCountEl = document.getElementById('totalCount');

  const BASE_TILT = 55;
  let flipping = false;
  let heads = 0, tails = 0, total = 0;

  let dragging = false;
  let dragMoved = false;
  let dragStartX = 0;
  let dragStartRotY = 0;
  let currentRotY = 0;
  let hoverTiltX = 0;
  let hoverTiltY = 0;

  function render(){
    if(flipping) return;
    coin.style.transform =
      `rotateX(${BASE_TILT + hoverTiltY}deg) rotateY(${currentRotY + hoverTiltX}deg)`;
  }

  function setResultLabel(side){
    resultEl.textContent = side === 'heads' ? 'Heads!' : 'Tails!';
    resultEl.classList.add('show');
  }

  function recordFlipResult(outcome){
    total++;
    if(outcome === 'heads'){ heads++; } else { tails++; }
    headsCountEl.textContent = heads;
    tailsCountEl.textContent = tails;
    totalCountEl.textContent = total;
  }

  function flip(){
    if(flipping) return;
    flipping = true;
    btn.disabled = true;
    coinFloat.classList.add('paused');
    resultEl.classList.remove('show');

    const outcome = Math.random() < 0.5 ? 'heads' : 'tails';

    coin.style.transform = '';
    coin.classList.remove('flip-heads','flip-tails');
    shadow.classList.add('squash');
    void coin.offsetWidth;

    coin.classList.add(outcome === 'heads' ? 'flip-heads' : 'flip-tails');

    setTimeout(()=>{ shadow.classList.remove('squash'); }, 900);

    setTimeout(()=>{
      flipping = false;
      btn.disabled = false;
      coinFloat.classList.remove('paused');
      coin.classList.remove('flip-heads','flip-tails');
      currentRotY = outcome === 'heads' ? 0 : 180;
      render();
      recordFlipResult(outcome);
      setResultLabel(outcome);
    }, 1120);
  }

  coin.addEventListener('pointerdown', (e)=>{
    if(flipping) return;
    dragging = true;
    dragMoved = false;
    dragStartX = e.clientX;
    dragStartRotY = currentRotY;
    coin.classList.add('grabbing');
    coinFloat.classList.add('paused');
    coin.setPointerCapture(e.pointerId);
  });

  coin.addEventListener('pointermove', (e)=>{
    if(!dragging) return;
    const delta = e.clientX - dragStartX;
    if(Math.abs(delta) > 4) dragMoved = true;
    currentRotY = dragStartRotY + delta * 0.6;
    render();
  });

  function endDrag(e){
    if(!dragging) return;
    dragging = false;
    coin.classList.remove('grabbing');

    if(!dragMoved){
      coinFloat.classList.remove('paused');
      flip();
      return;
    }

    const nearest = Math.round(currentRotY / 180) * 180;
    coin.style.transition = 'transform 0.35s cubic-bezier(.2,.8,.3,1)';
    currentRotY = nearest;
    render();
    setTimeout(()=>{
      coin.style.transition = '';
      coinFloat.classList.remove('paused');
      const facingHeads = (((nearest % 360) + 360) % 360) === 0;
      setResultLabel(facingHeads ? 'heads' : 'tails');
    }, 360);
  }

  coin.addEventListener('pointerup', endDrag);
  coin.addEventListener('pointercancel', endDrag);

  const stage = document.querySelector('.stage');
  stage.addEventListener('pointermove', (e)=>{
    if(dragging || flipping) return;
    const rect = stage.getBoundingClientRect();
    const relX = (e.clientX - rect.left) / rect.width - 0.5;
    const relY = (e.clientY - rect.top) / rect.height - 0.5;
    hoverTiltX = relX * 20;
    hoverTiltY = relY * -14;
    render();
  });
  stage.addEventListener('pointerleave', ()=>{
    if(dragging || flipping) return;
    hoverTiltX = 0;
    hoverTiltY = 0;
    render();
  });

  btn.addEventListener('click', flip);
