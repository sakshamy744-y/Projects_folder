<style>
  :root{
    --bg:#14161B;
    --panel:#1C1F26;
    --panel-raised:#22262F;
    --line:#2C303A;
    --amber:#FFB020;
    --sage:#6FBF97;
    --bubble-recv:#2A2E38;
    --text:#ECECEF;
    --text-dim:#8A8F9C;
    --danger:#E0637A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    overflow:hidden;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }

  /* ---------- picker screen ---------- */
  #picker{
    position:fixed; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:36px;
    background:
      radial-gradient(circle at 50% 30%, rgba(255,176,32,0.08), transparent 60%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px),
      var(--bg);
    padding:24px;
    text-align:center;
  }
  .picker-eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.2em;
    color:var(--amber);
    text-transform:uppercase;
  }
  .picker-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:clamp(32px,7vw,52px);
    font-weight:700;
    margin:8px 0 4px;
  }
  .picker-sub{
    color:var(--text-dim);
    font-size:14px;
    max-width:340px;
    line-height:1.5;
  }
  .dial-row{ display:flex; gap:18px; flex-wrap:wrap; justify-content:center; }
  .dial-btn{
    width:150px;
    padding:22px 16px;
    border-radius:16px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--text);
    cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
    font-family:'Inter',sans-serif;
  }
  .dial-btn:hover{ transform:translateY(-3px); border-color:var(--amber); background:var(--panel-raised); }
  .dial-btn:active{ transform:translateY(0); }
  .dial-avatar{
    width:52px; height:52px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:20px;
    background:linear-gradient(150deg, var(--amber), #ff8a3d);
    color:#161616;
  }
  .dial-btn:nth-child(2) .dial-avatar{ background:linear-gradient(150deg, var(--sage), #3f9ea9); color:#0e1a17;}
  .dial-name{ font-weight:600; font-size:15px; }
  .dial-tag{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); }

  /* ---------- chat screen ---------- */
  #chat{
    display:none;
    height:100dvh;
    flex-direction:column;
  }
  .app-header{
    display:flex; align-items:center; gap:12px;
    padding:14px 16px;
    background:var(--panel);
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .avatar{
    width:40px; height:40px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px;
    background:linear-gradient(150deg, var(--sage), #3f9ea9);
    color:#0e1a17;
    position:relative;
    flex-shrink:0;
    cursor:pointer;
  }
  .led{
    position:absolute; bottom:-1px; right:-1px;
    width:11px; height:11px; border-radius:50%;
    background:var(--text-dim);
    border:2px solid var(--panel);
    transition:background .3s ease;
  }
  .led.online{ background:var(--sage); box-shadow:0 0 6px var(--sage); }
  .header-meta{ flex:1; min-width:0; }
  .header-name{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:16px; }
  .header-status{ font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--text-dim); }
  .header-actions{ display:flex; gap:8px; align-items:center; }

  #profileMenuOverlay{
    display:none;
    position:fixed; inset:0;
    background:rgba(0,0,0,0.55);
    z-index:60;
  }
  #profileMenuOverlay.show{ display:block; }
  #profileMenu{
    position:absolute;
    top:64px; left:14px;
    width:230px;
    background:var(--panel-raised);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 12px 30px rgba(0,0,0,0.5);
  }
  .profile-menu-header{
    padding:12px 14px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-dim);
    border-bottom:1px solid var(--line);
  }
  .profile-menu-item{
    width:100%;
    text-align:left;
    padding:13px 14px;
    background:none;
    border:none;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14px;
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
  }
  .profile-menu-item:active{ background:rgba(255,255,255,0.06); }
  .profile-menu-item svg{ width:17px; height:17px; flex-shrink:0; color:var(--text-dim); }
  .profile-menu-item.danger{ color:var(--danger); }

  #attachMenuOverlay{
    display:none;
    position:fixed; inset:0;
    background:rgba(0,0,0,0.55);
    z-index:60;
  }
  #attachMenuOverlay.show{ display:block; }
  #attachMenu{
    position:absolute;
    bottom:78px; left:14px;
    width:210px;
    background:var(--panel-raised);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 12px 30px rgba(0,0,0,0.5);
  }
  .profile-menu-item.danger svg{ color:var(--danger); }
  .profile-menu-divider{ height:1px; background:var(--line); margin:4px 0; }
  .icon-btn{
    width:38px; height:38px; border-radius:10px;
    border:1px solid var(--line);
    background:var(--panel-raised);
    color:var(--text-dim);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    position:relative;
    transition:border-color .15s ease, color .15s ease;
  }
  .icon-btn:hover{ border-color:var(--amber); color:var(--amber); }
  .icon-btn.active{ color:var(--amber); border-color:var(--amber); }
  .icon-btn svg{ width:18px; height:18px; }
  .bell-ring{ animation: ring 0.6s ease; }
  @keyframes ring{
    0%,100%{ transform:rotate(0);}
    15%{ transform:rotate(18deg);}
    30%{ transform:rotate(-16deg);}
    45%{ transform:rotate(12deg);}

<script>
  // ---------- on-screen debug tools (visible without DevTools) ----------
  var __debugBanner = document.getElementById("debugBanner");
  var __debugStatus = document.getElementById("debugStatus");
  var __errorLog = [];

  function showDebugError(label, detail){
    __errorLog.push(label + (detail ? ": " + detail : ""));
    __debugBanner.textContent = __errorLog.slice(-6).map(function(l){ return "✗ " + l; }).join("\n");
    __debugBanner.classList.add("show");
  }
  function setDebugStatus(text){
    if(__debugStatus) __debugStatus.textContent = text;
  }

  window.addEventListener("error", function(e){
    showDebugError("Script error", e.message + " (line " + e.lineno + ")");
  });
  window.addEventListener("unhandledrejection", function(e){
    var reason = e.reason && e.reason.message ? e.reason.message : String(e.reason);
    reportNetworkIssue(reason);
  });

  function reportNetworkIssue(reason){
    if(reason && /Headers object could not be cloned/i.test(reason)){
      showDebugError(
        "In-app browser is blocking the connection",
        "This exact error happens when a link is opened inside another app's built-in browser " +
        "(WhatsApp, Instagram, Facebook, etc.) instead of a real browser. " +
        "Tap the ⋮ or ••• menu at the top/bottom of this screen and choose " +
        "\"Open in Chrome\" / \"Open in browser\" — then try again."
      );
    } else {
      showDebugError("Unhandled promise error", reason);
    }
  }

  // Detect common in-app browsers up front (WhatsApp, Instagram, Facebook,
  // Messenger, Twitter/X, LinkedIn, TikTok, Snapchat, Line) — these are the
  // most common cause of the Headers/postMessage clone error.
  var ua = navigator.userAgent || "";
  var inAppBrowser =
    /FBAN|FBAV|FB_IAB|Instagram|WhatsApp|Line\/|Twitter|TikTok|Snapchat|LinkedInApp|MicroMessenger/i.test(ua);
  if(inAppBrowser){
    setDebugStatus("⚠ opened inside an in-app browser — this often breaks live features");
    showDebugError(
      "You're viewing this inside another app's built-in browser",
      "Tap the ⋮ / ••• / share menu and choose \"Open in Chrome\" or \"Open in browser\" for the chat to work reliably."
    );
  }

  if(typeof window.supabase === "undefined"){
    showDebugError("Supabase library failed to load from CDN — check your internet connection or an ad-blocker may be blocking cdn.jsdelivr.net");
    setDebugStatus("supabase-js: NOT LOADED");
  } else if(!inAppBrowser){
    setDebugStatus("supabase-js: loaded ✓ — connecting to database…");
  }
</script>

  // ---------- messages: Supabase is now the single source of truth ----------
  function rowToMsg(row){
    return { id: row.id, from: row.sender, text: row.text, ts: new Date(row.created_at).getTime(), type: row.type || "text", mediaUrl: row.media_url || null };
  }

  async function fetchInitialMessages(){
    setDebugStatus("fetching messages from Supabase…");
    try{
      const { data, error } = await sb.from("messages").select("*").order("created_at", { ascending: true }).limit(300);
      if(error){
        console.error("Failed to load messages:", error);
        showDebugError("Failed to load messages", error.message + (error.code ? " (code " + error.code + ")" : ""));
        setDebugStatus("load failed — see error above");
        showToast({ text: "Couldn't load messages — check your connection." });
        return [];
      }
      setDebugStatus("loaded " + data.length + " message(s) from Supabase ✓");
      return data.map(rowToMsg);
    } catch(e){
      console.error("Network exception while loading messages:", e);
      showDebugError("Network error loading messages", (e.message || String(e)) + " — this often means a data-saving proxy (Chrome Lite mode / carrier compression) is interfering, OR the page is open inside another app's in-app browser. Try disabling Data Saver, switching to Wi-Fi, or opening this link in your real browser app.");
      setDebugStatus("load failed — network/proxy issue");
      return [];
    }
  }

  function renderList(list){
    messagesEl.innerHTML = "";
    messagesEl.appendChild(typingRow);
    let lastDay = "";
    list.forEach(m=>{
      const day = new Date(m.ts).toDateString();
      if(day !== lastDay){
        const div = document.createElement("div");
        div.className = "day-divider";
        div.textContent = formatDay(m.ts);
        messagesEl.appendChild(div);
        lastDay = day;
      }
      appendBubble(m, false);
    });
    scrollToBottom();
  }

  function formatDay(ts){
    const d = new Date(ts);
    const today = new Date();
    if(d.toDateString() === today.toDateString()) return "Today";
    return d.toLocaleDateString(undefined,{month:"short",day:"numeric"});
  }
  function formatTime(ts){
    return new Date(ts).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
  }

  function appendBubble(m, animate){
    const row = document.createElement("div");
    row.className = "bubble-row " + (m.from === identity ? "me" : "them");
    const b = document.createElement("div");
    b.className = "bubble";
    if(!animate) b.style.animation = "none";

    if(m.type === "image" && m.mediaUrl){
      const img = document.createElement("img");
      img.className = "bubble-image";
      img.src = m.mediaUrl;
      img.alt = "photo";
      img.addEventListener("click", ()=> window.open(m.mediaUrl, "_blank"));
      b.appendChild(img);
    } else if(m.type === "video" && m.mediaUrl){
      const video = document.createElement("video");
      video.className = "bubble-video";
      video.src = m.mediaUrl;
      video.controls = true;
      video.preload = "metadata";
      b.appendChild(video);
    } else if(m.type === "file" && m.mediaUrl){
      const wrap = document.createElement("div");
      wrap.className = "bubble-file";
      wrap.addEventListener("click", ()=> window.open(m.mediaUrl, "_blank"));
      const icon = document.createElement("div");
      icon.className = "bubble-file-icon";
      icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M9 15h6M9 11h1"/></svg>';
      const textWrap = document.createElement("div");
      const nameEl = document.createElement("div");
      nameEl.className = "bubble-file-name";
      nameEl.textContent = m.text || "Document.pdf";
      const subEl = document.createElement("div");
      subEl.className = "bubble-file-sub";
      subEl.textContent = "PDF · tap to open";
      textWrap.appendChild(nameEl);
      textWrap.appendChild(subEl);
      wrap.appendChild(icon);
      wrap.appendChild(textWrap);
      b.appendChild(wrap);
    } else if(m.type === "audio" && m.mediaUrl){
      const wrap = document.createElement("div");
      wrap.className = "bubble-audio";
      const audio = document.createElement("audio");
      audio.controls = true;
      audio.src = m.mediaUrl;
      wrap.appendChild(audio);
      b.appendChild(wrap);
    } else if(m.type === "uploading"){
      const span = document.createElement("span");
      span.className = "bubble-uploading";
      span.textContent = m.text || "Uploading…";
      b.appendChild(span);
    } else {
      const textSpan = document.createElement("span");
      textSpan.textContent = m.text;
      b.appendChild(textSpan);
    }

    const time = document.createElement("span");
    time.className = "bubble-time";
    time.textContent = formatTime(m.ts);
    b.appendChild(time);
    row.appendChild(b);
    messagesEl.insertBefore(row, typingRow);
    return row;
  }

  function appendIncomingWithDivider(m){
    const lastRow = messagesEl.querySelector(".bubble-row:last-of-type, .day-divider:last-of-type");

      div.className = "day-divider";
      div.textContent = formatDay(m.ts);
      messagesEl.insertBefore(div, typingRow);
    }

    appendBubble(m, true);
  }

  async function sendMessage(){

      if(error){
        console.error("Send failed:", error);
        showDebugError("Failed to send message", error.message + (error.code ? " (code " + error.code + ")" : ""));
        showToast({ text: "Message failed to send — check your connection." });

    } catch(e){
      console.error("Network exception while sending:", e);
      showDebugError("Network error sending message", (e.message || String(e)) + " — try disabling Data Saver / Lite mode, switching to Wi-Fi, or opening this link in your real browser app instead of an in-app browser.");
      showToast({ text: "Message failed to send — network issue." });
    }

    // for both this device and the other one, keeping everything in sync.

  // ---------- media upload helper (used by both photo and voice messages) ----------
  async function uploadMedia(blob, ext, folder){
    const path = folder + "/" + identity + "-" + Date.now() + "." + ext;
    const { error: uploadError } = await sb.storage.from("chat-media").upload(path, blob, {
      contentType: blob.type || undefined,
      upsert: false
    });
    if(uploadError) throw uploadError;
    const { data } = sb.storage.from("chat-media").getPublicUrl(path);
    return data.publicUrl;
  }

  // ---------- attach sending: photos (multiple), video, PDF ----------
  // Separate pickers per type — combining image/video/pdf into one <input>
  // often makes mobile browsers fall back to a single-select file browser
  // instead of the proper multi-select photo gallery, so each type gets
  // its own dedicated input.
  async function sendAttachment(file, kind, folder){
    setDebugStatus("uploading " + kind + ": " + file.name + "…");
    try{
      const ext = (file.name.split(".").pop() || (kind === "image" ? "jpg" : kind === "video" ? "mp4" : "pdf")).toLowerCase();
      const url = await uploadMedia(file, ext, folder);
      const messageText = kind === "file" ? file.name : "";
      const { error } = await sb.from("messages").insert({ sender: identity, text: messageText, type: kind, media_url: url });
      if(error) throw error;
      setDebugStatus(kind + " sent ✓ (" + file.name + ")");
    } catch(e){
      console.error("Attachment send failed:", file.name, e);
      showDebugError("Failed to send " + file.name, e.message || String(e));
      showToast({ text: file.name + " failed to send." });
    }
  }

  // ---------- voice message recording ----------
  let mediaRecorder = null;
  let recordedChunks = [];
  let recordingStartTime = 0;
  let recordingTimerId = null;
  let recordingCancelled = false;

  micBtn.addEventListener("click", async ()=>{
    if(mediaRecorder && mediaRecorder.state === "recording") return; // already recording

    if(!isSecureContext){
      showDebugError("Voice recording blocked", "Microphone access requires https:// — this page isn't running as a secure context.");
      showToast({ text: "Voice recording needs a secure (https) connection." });
      return;
    }
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      showDebugError("Voice recording not supported", "navigator.mediaDevices.getUserMedia is unavailable in this browser.");
      showToast({ text: "This browser doesn't support voice recording." });
      return;
    }
    if(typeof MediaRecorder === "undefined"){
      showDebugError("Voice recording not supported", "The MediaRecorder API is unavailable in this browser (common on some iOS browser versions).");
      showToast({ text: "This browser can't record audio." });
      return;
    }

    try{
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      recordedChunks = [];
      recordingCancelled = false;
      let mimeType = "";
      for(const candidate of ["audio/webm", "audio/mp4", "audio/ogg"]){
        if(MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(candidate)){
          mimeType = candidate;
          break;
        }
      }
      mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);

      mediaRecorder.ondataavailable = (e)=>{ if(e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = async ()=>{
        stream.getTracks().forEach(t=> t.stop());
        clearInterval(recordingTimerId);
        recordingBar.classList.remove("show");
        micBtn.classList.remove("recording");
        if(recordingCancelled || recordedChunks.length === 0) return;

        const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || "audio/webm" });
        setDebugStatus("uploading voice message…");
        try{
          const ext = (blob.type.split("/")[1] || "webm").split(";")[0];
          const url = await uploadMedia(blob, ext, "voice");
          const { error } = await sb.from("messages").insert({ sender: identity, text: "", type: "audio", media_url: url });
          if(error) throw error;
          setDebugStatus("voice message sent ✓");
        } catch(e){
          console.error("Voice message send failed:", e);
          showDebugError("Failed to send voice message", e.message || String(e));
          showToast({ text: "Voice message failed to send." });
        }
      };

      mediaRecorder.start();
      micBtn.classList.add("recording");
      recordingBar.classList.add("show");
      recordingStartTime = Date.now();
      recordingTimerId = setInterval(()=>{
        const secs = Math.floor((Date.now() - recordingStartTime) / 1000);
        const m = Math.floor(secs / 60);
        const s = String(secs % 60).padStart(2, "0");
        recordingTimeEl.textContent = m + ":" + s;
      }, 250);
    } catch(e){
      console.error("Mic access failed:", e);
      showDebugError("Microphone access failed", (e.name || "Error") + ": " + (e.message || String(e)) + " — check that you allowed microphone permission for this site.");
      showToast({ text: "Couldn't access the microphone — check permissions." });
    }
  });

  // ---------- realtime: Supabase channel for messages, presence, typing ----------
  async function connectRealtime(){
    const initial = await fetchInitialMessages();
    renderList(initial);
    if(initial.length) window.__lastRenderedDay = new Date(initial[initial.length-1].ts).toDateString();

    channel = sb.channel(ROOM_NAME, { config: { presence: { key: identity } } });
    setDebugStatus("connecting to realtime channel…");

    channel.on("postgres_changes", { event: "INSERT", schema: "public", table: "messages" }, (payload)=>{
      const m = rowToMsg(payload.new);
      appendIncomingWithDivider(m);
      typingRow.classList.remove("show");
      if(m.from !== identity){
        onNewIncomingMessage(m);
      } else {
        scrollToBottom();
      }
    });

    channel.on("postgres_changes", { event: "DELETE", schema: "public", table: "messages" }, async ()=>{
      // a message (or the whole chat) was cleared somewhere — refresh to match
      const fresh = await fetchInitialMessages();
      renderList(fresh);
      if(fresh.length) window.__lastRenderedDay = new Date(fresh[fresh.length-1].ts).toDateString();
      showToast({ text: "Chat history was updated." });
    });

    channel.on("broadcast", { event: "typing" }, ({ payload })=>{
      if(payload.from !== identity){
        typingRow.classList.toggle("show", !!payload.active);
        if(payload.active) scrollToBottom();
      }
    });

    channel.on("presence", { event: "sync" }, ()=>{
      const state = channel.presenceState();
      const online = Object.prototype.hasOwnProperty.call(state, contact);
      contactLed.classList.toggle("online", online);
      contactStatus.textContent = online ? "online" : "offline";
    });

    channel.subscribe(async (status)=>{
      if(status === "SUBSCRIBED"){
        await channel.track({ online: true });
        setDebugStatus("connected ✓ realtime live — waiting for messages…");
      }
      if(status === "CHANNEL_ERROR" || status === "TIMED_OUT"){
        contactStatus.textContent = "connection issue";
        setDebugStatus("realtime status: " + status);
        showDebugError("Realtime connection failed", "status = " + status + " — check that you ran the SQL setup (realtime publication + RLS policies) in Supabase.");
        showToast({ text: "Realtime connection issue — messages may be delayed." });
      }
      if(status === "CLOSED"){
        setDebugStatus("realtime connection closed");
      }
    });
  }

  // ---------- notifications: sound, toast, desktop/OS ----------
  let audioCtx = null;
  function playPing(){
    if(!soundOn) return;
    try{
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      if(audioCtx.state === "suspended") audioCtx.resume();
      const now = audioCtx.currentTime;
      [880, 1320].forEach((freq, i)=>{
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        const start = now + i*0.09;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.18, start + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.22);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(start);
        osc.stop(start + 0.25);
      });
    }catch(e){ /* audio unavailable */ }
  }

  // ---------- service worker, inlined as a Blob (no separate .js file) ----------
  // Note: most browsers block registering a service worker from a blob: URL
  // for security reasons — this is attempted anyway and fails silently,
  // falling back to the plain Notification API below. That's the one
  // browser-enforced limitation of going fully single-file.
  let swRegistration = null;
  const SW_SOURCE = `
    const CACHE = "relay-cache-v1";
    self.addEventListener("install", () => self.skipWaiting());
    self.addEventListener("activate", () => self.clients.claim());
    self.addEventListener("fetch", (event) => {
      event.respondWith(fetch(event.request).catch(() => caches.match(event.request)));
    });
  `;
  if("serviceWorker" in navigator && isSecureContext){
    try{
      const swBlob = new Blob([SW_SOURCE], { type: "application/javascript" });
      const swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl)
        .then(reg => { swRegistration = reg; })
        .catch(err => { console.warn("Inline service worker blocked by browser (expected in most browsers):", err.message); });
    }catch(e){ console.warn("Could not create inline service worker:", e); }
  }

    if(swRegistration && swRegistration.showNotification){
      swRegistration.showNotification(contact + " · Chat GO", opts).catch(err=>{
        console.warn("showNotification failed:", err);
      });
      return;
    }
    try{
      const n = new Notification(contact + " · Chat GO", opts);
      n.onclick = ()=>{ window.focus(); clearUnread(); n.close(); };
    }catch(e){
      console.warn("Desktop notification failed:", e);
    }

  function onNewIncomingMessage(msg){
    // every single message notifies — sound, toast, badge, and a desktop/OS
    // notification — no matter whether the tab is focused or not.
    playPing();
    ringBell();
    unread++;
    updateBadge();
    desktopNotify(msg);
    showToast(msg);
    if(navigator.vibrate) navigator.vibrate([40,30,40]);
  }

  window.addEventListener("focus", ()=>{
    clearUnread();
  });

  // ---------- permission banner (shows real status + reasons it can fail) ----------

  function updatePermBanner(){
    const supported = "Notification" in window;
    const dismissed = localStorage.getItem("relay_perm_dismissed") === "1";

    if(!isSecureContext){
      permBannerText.textContent = "Opened as a local file — notifications & home-screen install need it served over http(s). See instructions below.";
      permBtn.textContent = "Got it";
      permBanner.classList.add("show");
      return;
    }
    if(!supported){
      permBannerText.textContent = "This browser doesn't support desktop notifications.";
      permBanner.classList.add("show");
      permBtn.style.display = "none";
      return;
    }
    if(Notification.permission === "denied"){
      permBannerText.textContent = "Notifications are blocked for this site in your browser settings. Enable them there, then reload.";
      permBtn.textContent = "Test sound only";
      permBanner.classList.add("show");
      return;
    }
    if(Notification.permission === "default" && !dismissed){
      permBannerText.textContent = "Turn on desktop & sound alerts for new messages";
      permBtn.textContent = "Enable";
      permBanner.classList.add("show");
      return;
    }
    permBanner.classList.remove("show");
  }

  permBtn.addEventListener("click", ()=>{
    // unlock audio on this user gesture
    try{
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      if(audioCtx.state === "suspended") audioCtx.resume();
      playPing();
    }catch(e){}

    if(!isSecureContext){
      localStorage.setItem("relay_perm_dismissed","1");
      updatePermBanner();
      return;
    }
    if("Notification" in window && Notification.permission === "default"){
      Notification.requestPermission().then(()=>{
        localStorage.setItem("relay_perm_dismissed","1");
        updatePermBanner();
        if(Notification.permission === "granted"){
          desktopNotify({ text: "Notifications are on. You'll see alerts like this one." });
        }
      });
    } else {
      localStorage.setItem("relay_perm_dismissed","1");
      updatePermBanner();
    }
  });

  soundBtn.addEventListener("click", ()=>{
    soundOn = !soundOn;
    localStorage.setItem("relay_sound", soundOn ? "on" : "off");
    soundBtn.classList.toggle("active", soundOn);
    if(soundOn) playPing();
  });

  // ---------- install to home screen ----------
  const installBtn = document.getElementById("installBtn");
  let deferredInstallPrompt = null;

  window.addEventListener("beforeinstallprompt", (e)=>{
    e.preventDefault();
    deferredInstallPrompt = e;
    if(isSecureContext) installBtn.style.display = "flex";
  });

  installBtn.addEventListener("click", async ()=>{
    if(!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    installBtn.style.display = "none";
  });

  window.addEventListener("appinstalled", ()=>{
    installBtn.style.display = "none";
  });

})();
